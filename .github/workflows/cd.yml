name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed

jobs:
  deploy:
    name: deploy
    runs-on: ubuntu-24.04
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Docker login
        uses: docker/login-action@v3.4.0
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push docker image
        uses: docker/build-push-action@v6.15.0
        with:
          context: . 
          file: ./Dockerfile
          push: true
          tags: andrevlopess/grupo-1-p2-front-devops:latest

      - name: Azure app
        uses: Azure/webapps-deploy@v3.0.1
        with:
          app-name: grupo-1-p2-front-devops
          publish-profile: ${{ secrets.AZ_PUBLISH_PROFILE }}
          image: andrevlopess/grupo-1-p2-front-devops:latest
          
