	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
		integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
		crossorigin="anonymous"></script>

	<script>
		
		const bancoDeDadosAlbum = {
			alemanha: {
				nome : "Alemanha",
				totalFigurinhas: 20,
				fundo: "../../assets/background/fundo-alemanha.png",
				coladas: {}
			},
			argentina: {
				nome : "Argentina",
				totalFigurinhas: 20,
				fundo: "../../assets/background/fundo-argentina.png",
				coladas: {}
			},
			australia: {
				nome : "Australia",
				totalFigurinhas: 20,
				fundo: "../../assets/background/fundo-australia.png",
				coladas: {}
			},
			brasil: {
				nome : "Brasil",
				totalFigurinhas: 20,
				fundo: "../../assets/background/fundo-brasil.png",
				coladas: {}
			},
			coreia: {
				nome : "Coreia",
				totalFigurinhas: 20,
				fundo: "../../assets/background/fundo-coreia.png",
				coladas: {}
			},
			croacia: {
				nome : "Croacia",
				totalFigurinhas: 20,
				fundo: "../../assets/background/fundo-croacia.jpg",
				coladas: {}
			},
			espanha: {
				nome : "Espanha",
				totalFigurinhas: 20,
				fundo: "../../assets/background/fundo-espanha.png",
				coladas: {}
			},
			franca: {
				nome : "Franca",
				totalFigurinhas: 20,
				fundo: "../../assets/background/fundo-franca.png",
				coladas: {}
			},
			holanda: {
				nome : "Holanda",
				totalFigurinhas: 20,
				fundo: "../../assets/background/fundo-holanda.png",
				coladas: {}
			},
			inglaterra: {
				nome : "Inglaterra",
				totalFigurinhas: 20,
				fundo: "../../assets/background/fundo-inglaterra.png",
				coladas: {}
			},
			japao: {
				nome : "Japão",
				totalFigurinhas: 20,
				fundo: "../../assets/background/fundo-japao.png",
				coladas: {}
			},
			marrocos: {
				nome : "Marrocos",
				totalFigurinhas: 20,
				fundo: "../../assets/background/fundo-marrocos.png",
				coladas: {}
			},
			polonia: {
				nome : "Polonia",
				totalFigurinhas: 20,
				fundo: "../../assets/background/fundo-polonia.png",
				coladas: {}
			},
			portugal: {
				nome : "Portugal",
				totalFigurinhas: 20,
				fundo: "../../assets/background/fundo-portugal.png",
				coladas: {}
			},
			senegal: {
				nome : "Senegal",
				totalFigurinhas: 20,
				fundo: "../../assets/background/fundo-senegal.png",
				coladas: {}
			},
			suica: {
				nome : "Suiça",
				totalFigurinhas: 20,
				fundo: "../../assets/background/fundo-suica.png",
				coladas: {}
			},
			eua: {
				nome : "Estados Unidos",
				fundo: "../../assets/background/fundo-eua.png",
				totalFigurinhas: 20,
				coladas: {}
			},
		};

		const ordemPaises = ["alemanha", "argentina", "australia", "brasil", "coreia", "croacia", "espanha", "eua", 
		"franca", "holanda", "inglaterra", "japao", "marrocos", "polonia", "portugal", "senegal", "suica"];
		let indiceAtual = 0;

		function renderizarAlbum(){
			const grid = document.getElementById("albumGrid");
			const titulo = document.getElementById("nomeDoPais");

			const containerFundo = document.getElementById("appContainer");
			
			const siglaAtual = ordemPaises[indiceAtual];
			const dadosPais = bancoDeDadosAlbum[siglaAtual];

			if(titulo) titulo.innerText = dadosPais.nome;

			if (containerFundo && dadosPais.fundo) {
            containerFundo.style.backgroundImage = `url(${dadosPais.fundo})`;
        	}

			grid.innerHTML = '';

			grid.appendChild(document.createElement('div'));
        	grid.appendChild(document.createElement('div'));

			for (let i = 1; i <= dadosPais.totalFigurinhas; i++){
				const divFigurinha = document.createElement("div");

				const figurinhaColada = dadosPais.coladas[i];

				if (figurinhaColada){
					divFigurinha.className = `col-3 fig ${figurinhaColada.classeExtra}`;
					divFigurinha.innerHTML = `<img src="${figurinhaColada.img}" alt="Figurinha ${i}">`;
				} else {
					divFigurinha.className = 'col-3 fig';
                	divFigurinha.innerText = i;
				}

				if (i === 1) {
                    divFigurinha.classList.add('selecao');
                }

				grid.appendChild(divFigurinha);

				if (i === 1 || i === 8 || i === 16) {
                // Cria a lombada do livro dividindo as páginas no meio
                grid.appendChild(document.createElement('div'));
            } else if (i === 4) {
                // Cria um buraco no canto superior direito para NÃO tampar o logo do Qatar!
                // Isso empurra a carta 5 para a linha de baixo.
                grid.appendChild(document.createElement('div'));
            }
			}
		}

		function mudarPagina(direcao){
			indiceAtual += direcao;

        // Faz o carrossel dar a volta se passar do limite
        if (indiceAtual < 0) {
            indiceAtual = ordemPaises.length - 1;
        } else if (indiceAtual >= ordemPaises.length) {
            indiceAtual = 0;
        }

        renderizarAlbum();
		}

		window.onload = () => {
        renderizarAlbum();
    };
	</script>
