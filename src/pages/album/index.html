<body>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
		integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
		crossorigin="anonymous"></script>

	<script>

		const bancoDeDadosAlbum = {
			arg: {
				nome: "Argentina",
				totalFigurinhas: 20,
				fundo: "../../assets/background/fundo-argentina.webp",
				coladas: {}
			},
			aus: {
				nome: "Australia",
				totalFigurinhas: 20,
				fundo: "../../assets/background/fundo-australia.webp",
				coladas: {}
			},
			bra: {
				nome: "Brasil",
				totalFigurinhas: 20,
				fundo: "../../assets/background/fundo-brasil.webp",
				coladas: {}
			},
			kor: {
				nome: "Coreia",
				totalFigurinhas: 20,
				fundo: "../../assets/background/fundo-coreia.webp",
				coladas: {}
			},
			cro: {
				nome: "Croacia",
				totalFigurinhas: 20,
				fundo: "../../assets/background/fundo-croacia.webp",
				coladas: {}
			},
			esp: {
				nome: "Espanha",
				totalFigurinhas: 20,
				fundo: "../../assets/background/fundo-espanha.webp",
				coladas: {}
			},
			fra: {
				nome: "Franca",
				totalFigurinhas: 20,
				fundo: "../../assets/background/fundo-franca.webp",
				coladas: {}
			},
			ned: {
				nome: "Holanda",
				totalFigurinhas: 20,
				fundo: "../../assets/background/fundo-holanda.webp",
				coladas: {}
			},
			eng: {
				nome: "Inglaterra",
				totalFigurinhas: 20,
				fundo: "../../assets/background/fundo-inglaterra.webp",
				coladas: {}
			},
			jpn: {
				nome: "Japão",
				totalFigurinhas: 20,
				fundo: "../../assets/background/fundo-japao.webp",
				coladas: {}
			},
			mar: {
				nome: "Marrocos",
				totalFigurinhas: 20,
				fundo: "../../assets/background/fundo-marrocos.webp",
				coladas: {}
			},
			pol: {
				nome: "Polonia",
				totalFigurinhas: 20,
				fundo: "../../assets/background/fundo-polonia.webp",
				coladas: {}
			},
			por: {
				nome: "Portugal",
				totalFigurinhas: 20,
				fundo: "../../assets/background/fundo-portugal.webp",
				coladas: {}
			},
			sen: {
				nome: "Senegal",
				totalFigurinhas: 20,
				fundo: "../../assets/background/fundo-senegal.webp",
				coladas: {}
			},
			sui: {
				nome: "Suiça",
				totalFigurinhas: 20,
				fundo: "../../assets/background/fundo-suica.webp",
				coladas: {}
			},
			usa: {
				nome: "Estados Unidos",
				fundo: "../../assets/background/fundo-eua.webp",
				totalFigurinhas: 20,
				coladas: {}
			},
		};

		const ordemPaises = ["arg", "aus", "bra", "kor", "cro", "esp", "usa",
			"fra", "ned", "eng", "jpn", "mar", "pol", "por", "sen", "sui"];
		let indiceAtual = 0;

		function sincAlbum(){
            
            const figurinhasSalvas = JSON.parse(localStorage.getItem('collection-stickers') || "[]");            
            figurinhasSalvas.forEach(sticker => {
                const sigla = sticker.team; 

                if(bancoDeDadosAlbum[sigla]){
                    let classeCSS = "";
                    if(sticker.position == 1){
                        classeCSS = "selecao";
                    }
                    
                    bancoDeDadosAlbum[sigla].coladas[sticker.position] = {
                        img: `../../asset/${sticker.url.replace('src/asset/', '')}`, 
                        classeExtra: classeCSS
                     };
                }
            });
        }

		function renderizarAlbum() {
			const grid = document.getElementById("albumGrid");
			const titulo = document.getElementById("nomeDoPais");

			const containerFundo = document.getElementById("appContainer");

			const siglaAtual = ordemPaises[indiceAtual];
			const dadosPais = bancoDeDadosAlbum[siglaAtual];

			if (titulo) titulo.innerText = dadosPais.nome;

			if (containerFundo && dadosPais.fundo) {
				containerFundo.style.backgroundImage = `url(${dadosPais.fundo})`;
			}

			grid.innerHTML = '';

			grid.appendChild(document.createElement('div'));
			grid.appendChild(document.createElement('div'));

			for (let i = 1; i <= dadosPais.totalFigurinhas; i++) {
				const divFigurinha = document.createElement("div");

				const figurinhaColada = dadosPais.coladas[i];

				if (figurinhaColada) {
					divFigurinha.className = `col-3 fig ${figurinhaColada.classeExtra}`;
					divFigurinha.innerHTML = `<img src="${figurinhaColada.img}" alt="Figurinha ${i}" style="width: 100%; height: 100%; object-fit: cover; border-radius: 4px;">`;
				} else {
					divFigurinha.className = 'col-3 fig';
					divFigurinha.innerText = i;
				}

				if (i === 1) {
					divFigurinha.classList.add('selecao');
				}

				grid.appendChild(divFigurinha);

				if (i === 1 || i === 8 || i === 16) {
					grid.appendChild(document.createElement('div'));
				} else if (i === 4) {
					grid.appendChild(document.createElement('div'));
				}
			}
		}

		function mudarPagina(direcao) {
			indiceAtual += direcao;

			if (indiceAtual < 0) {
				indiceAtual = ordemPaises.length - 1;
			} else if (indiceAtual >= ordemPaises.length) {
				indiceAtual = 0;
			}

			renderizarAlbum();
		}

		window.onload = () => {

            sincAlbum(); 

            const params = new URLSearchParams(window.location.search);
            const paisParam = params.get('pais');

            if (paisParam && ordemPaises.includes(paisParam)) {
                indiceAtual = ordemPaises.indexOf(paisParam);
            }

            renderizarAlbum();
        };
	</script>
	<script src="../../public/stickers.js"></script>
	<script src="../../pages/sorteiofig.js"></script>	
</body>
</html>
